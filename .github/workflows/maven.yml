name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v3
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    - name: Authenticate to AWS CodeArtifact
      id: login
      run: |
        export CODEARTIFACT_AUTH_TOKEN=$(aws codeartifact get-authorization-token \
          --domain demo \
          --domain-owner 048394383216 \
          --region ap-south-1 \
          --query authorizationToken \
          --output text)
        echo "token=$CODEARTIFACT_AUTH_TOKEN" >> $GITHUB_ENV

    - name: Configure Maven to use AWS CodeArtifact
      run: |
        mkdir -p ~/.m2
        cat <<EOF > ~/.m2/settings.xml
        <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 http://maven.apache.org/xsd/settings-1.0.0.xsd">
          <servers>
            <server>
              <id>demo-Demo-repository</id>
              <username>aws</username>
              <password>${{ env.token }}</password>
            </server>
          </servers>
          <profiles>
            <profile>
              <id>demo-Demo-repository</id>
              <activation>
                <activeByDefault>true</activeByDefault>
              </activation>
              <repositories>
                <repository>
                  <id>demo-Demo-repository</id>
                  <url>https://demo-048394383216.d.codeartifact.ap-south-1.amazonaws.com/maven/Demo-repository/</url>
                </repository>
              </repositories>
            </profile>
          </profiles>
        </settings>
        EOF

    - name: Build and Deploy with Maven
      run: mvn deploy --settings ~/.m2/settings.xml
